<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathWake 智力喚醒鬧鐘</title>
    <!-- 引入 Outfit 與 Plus Jakarta Sans 字型 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 25, 40, 0.75);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-primary: #6366f1;
            /* Indigo */
            --accent-secondary: #a855f7;
            /* Purple */
            --danger-color: #ef4444;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 背景流光裝飾 */
        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: 10%;
            left: 5%;
            z-index: 1;
            pointer-events: none;
        }

        .ambient-glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            bottom: 5%;
            right: 5%;
            z-index: 1;
            pointer-events: none;
        }

        /* 鬧鐘啟動時的紅色呼吸背景效果 */
        .alarm-pulse-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            box-shadow: inset 0 0 100px rgba(239, 68, 68, 0);
            transition: box-shadow 0.5s ease;
            z-index: 2;
            animation: pulse-overlay 3s infinite alternate;
        }

        @keyframes pulse-overlay {
            0% {
                box-shadow: inset 0 0 40px rgba(239, 68, 68, 0.1);
            }

            100% {
                box-shadow: inset 0 0 100px rgba(239, 68, 68, 0.35);
            }
        }

        /* 解題主卡片 */
        .container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.05);
            text-align: center;
            transition: all 0.3s ease;
        }

        /* 標題與警示圖示 */
        .header {
            margin-bottom: 24px;
        }

        .bell-icon {
            font-size: 2.5rem;
            display: inline-block;
            animation: ring 0.6s ease-in-out infinite alternate;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.6));
        }

        @keyframes ring {
            0% {
                transform: rotate(-15deg);
            }

            100% {
                transform: rotate(15deg);
            }
        }

        .title {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 題目顯示區域 */
        .formula-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 24px 16px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .formula-text {
            font-size: 1.8rem;
            /* 縮小字體以完美呈現 7 數 6 運算子的超長算式 */
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            transition: transform 0.1s ease;
            white-space: nowrap;
            /* 確保算式單行呈現不換行錯位 */
            overflow-x: auto;
            /* 超出寬度時提供流暢的水平滾動 */
            padding: 8px 4px;
        }

        .formula-text::-webkit-scrollbar {
            height: 4px;
        }

        .formula-text::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.01);
        }

        .formula-text::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        /* 左右晃動動畫 (答錯時觸發) */
        .shake {
            animation: shake-anim 0.5s ease-in-out;
        }

        @keyframes shake-anim {

            0%,
            100% {
                transform: translateX(0);
            }

            15%,
            45%,
            75% {
                transform: translateX(-18px);
            }

            30%,
            60%,
            90% {
                transform: translateX(18px);
            }
        }

        /* 輸入預覽區域 */
        .input-display {
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            color: var(--accent-secondary);
            margin-bottom: 24px;
            transition: all 0.2s ease;
            position: relative;
        }

        .input-display.active-border {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }

        .input-display:empty::after {
            content: "輸入解答...";
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.2);
            font-weight: 400;
        }

        /* 光標閃爍效果 */
        .cursor {
            width: 3px;
            height: 30px;
            background-color: var(--accent-secondary);
            margin-left: 6px;
            animation: blink 0.8s infinite;
            display: inline-block;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        /* 虛擬數字鍵盤 */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .key {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            height: 60px;
            font-size: 1.5rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .key:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .key:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.95);
        }

        /* 功能按鈕特殊樣式 */
        .key.clear {
            color: var(--danger-color);
            background: rgba(239, 68, 68, 0.05);
        }

        .key.clear:hover {
            background: rgba(239, 68, 68, 0.15);
        }

        .key.backspace {
            color: var(--text-secondary);
        }

        /* 驗證送出按鈕 (跨欄) */
        .key.submit {
            grid-column: span 3;
            height: 64px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: #ffffff;
            font-weight: 700;
            font-size: 1.1rem;
            border: none;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
            letter-spacing: 2px;
            margin-top: 6px;
        }

        .key.submit:hover {
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.45);
            filter: brightness(1.1);
        }

        .key.submit:active {
            transform: scale(0.98);
        }

        /* 訊息提示 */
        .message-toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 14px 24px;
            border-radius: 16px;
            background: rgba(239, 68, 68, 0.9);
            backdrop-filter: blur(10px);
            color: #ffffff;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .message-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .message-toast.success {
            background: rgba(16, 185, 129, 0.9);
        }

        /* 音訊按鈕提示 (解決瀏覽器音訊限制) */
        .audio-unlocked-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 15, 25, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: opacity 0.5s ease;
        }

        .audio-unlocked-modal.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .modal-content {
            text-align: center;
            max-width: 320px;
            padding: 32px 24px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .start-btn {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border: none;
            color: white;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            width: 100%;
            transition: all 0.2s;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        .start-btn:active {
            transform: scale(0.98);
        }

        /* F-03 防逃避全螢幕遮罩模式 */
        .container.locked-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            max-width: 100vw;
            background: radial-gradient(circle at center, #0e1326 0%, #05070c 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
            pointer-events: auto;
            /* 阻斷所有背景事件 */
        }

        .container.locked-mode .card {
            width: 100%;
            max-width: 420px;
            border-color: rgba(99, 102, 241, 0.25);
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.15),
                0 20px 40px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>

    <!-- 鬧鈴啟動紅色光暈遮罩 -->
    <div class="alarm-pulse-overlay"></div>

    <!-- 背景流光 -->
    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>

    <!-- 音訊解鎖提示 (解決 Chrome/Safari 等禁止自動播放音樂的安全政策) -->
    <div id="audioModal" class="audio-unlocked-modal">
        <div class="modal-content">
            <span style="font-size: 3rem; display: block; margin-bottom: 12px;">⏰</span>
            <h2 style="font-size: 1.4rem; font-weight: 800; margin-bottom: 8px;">MathWake 鬧鐘響起</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem; line-height: 1.5;">
                大腦強制開機挑戰已準備就緒，請點擊下方按鈕解鎖鬧鈴音效並開始解題！</p>
            <button class="start-btn" onclick="startAlarmChallenge()">進入解題挑戰</button>
        </div>
    </div>

    <!-- 頂端吐司訊息提示 -->
    <div id="toast" class="message-toast">
        <span id="toast-icon">⚠️</span>
        <span id="toast-text">解答錯誤，請重試！</span>
    </div>

    <!-- 主卡片容器 -->
    <div class="container">
        <div class="card" id="solverCard">

            <!-- 標頭 -->
            <div class="header">
                <span class="bell-icon">🔔</span>
                <h1 class="title">智力喚醒挑戰</h1>
                <p class="subtitle" id="statusSubtitle">請輸入下方數學公式的正確整數解</p>
            </div>

            <!-- 數學題目公式區塊 -->
            <div class="formula-section" id="formulaBox">
                <div class="formula-text" id="questionText">-- × --</div>
            </div>

            <!-- 用戶答案預覽區 -->
            <div class="input-display" id="inputDisplay"></div>

            <!-- 虛擬按鍵面板 -->
            <div class="keypad">
                <div class="key" onclick="appendNumber(1)">1</div>
                <div class="key" onclick="appendNumber(2)">2</div>
                <div class="key" onclick="appendNumber(3)">3</div>

                <div class="key" onclick="appendNumber(4)">4</div>
                <div class="key" onclick="appendNumber(5)">5</div>
                <div class="key" onclick="appendNumber(6)">6</div>

                <div class="key" onclick="appendNumber(7)">7</div>
                <div class="key" onclick="appendNumber(8)">8</div>
                <div class="key" onclick="appendNumber(9)">9</div>

                <div class="key clear" onclick="clearInput()">C</div>
                <div class="key" onclick="appendNumber(0)">0</div>
                <div class="key backspace" onclick="backspaceInput()">⌫</div>

                <button class="key submit" onclick="submitAnswer()">驗證並關閉鬧鐘</button>
            </div>

        </div>
    </div>

    <script>
        let currentInput = "";
        let audioCtx = null;
        let alarmIntervalId = null;
        let gainNode = null;
        let penaltyIntervalId = null;
        let isChallengeActive = false; // F-03: 追蹤解題挑戰是否正處於活躍狀態

        // 初始化/解鎖音訊並載入題目
        async function startAlarmChallenge() {
            document.getElementById('audioModal').classList.add('hidden');

            // 1. 呼叫後端 API 初始化計時器
            await startAlarmTimer();

            // 2. 初始化 Web Audio API 生成鬧鈴音效 (包含 GainNode)
            initAlarmSound();

            // 3. 呼叫後端 API 取得隨機題目
            loadQuestion();

            // 4. 啟動音量懲罰輪詢機制
            startPenaltyPolling();

            // 5. F-03: 強制進入全螢幕並鎖定遮罩，阻斷背景交互
            enterFullscreen();
            document.querySelector('.container').classList.add('locked-mode');

            // 標記挑戰已啟動，開始追蹤焦點
            setTimeout(() => {
                isChallengeActive = true;
            }, 500);
        }

        // F-03: 強制全螢幕方法
        function enterFullscreen() {
            const docElm = document.documentElement;
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen().catch(err => console.log("全螢幕請求受阻 (需使用者操作解鎖): ", err));
            } else if (docElm.mozRequestFullScreen) { /* Firefox */
                docElm.mozRequestFullScreen();
            } else if (docElm.webkitRequestFullscreen) { /* Chrome, Safari and Opera */
                docElm.webkitRequestFullscreen();
            } else if (docElm.msRequestFullscreen) { /* IE/Edge */
                docElm.msRequestFullscreen();
            }
        }

        // F-03: 結束全螢幕方法
        function exitFullscreen() {
            try {
                if (document.fullscreenElement) {
                    if (document.exitFullscreen) {
                        document.exitFullscreen().catch(err => console.log("退出全螢幕失敗: ", err));
                    } else if (document.mozCancelFullScreen) {
                        document.mozCancelFullScreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    } else if (document.msExitFullscreen) {
                        document.msExitFullscreen();
                    }
                }
            } catch (e) {
                console.error("退出全螢幕異常: ", e);
            }
        }

        // F-03: 視窗焦點與分頁可見性監聽，阻斷任何逃逸與作弊手段
        window.addEventListener('blur', () => {
            triggerCheatPenalty();
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                triggerCheatPenalty();
            }
        });

        // F-03: 觸發作弊懲罰
        async function triggerCheatPenalty() {
            if (!isChallengeActive) return;

            // 暫時阻斷重複觸發
            isChallengeActive = false;

            try {
                const response = await fetch('https://mathwake-backend.zeabur.app/api/alarms/cheat-penalty', { method: 'POST' });
                const data = await response.json();

                if (data.success) {
                    // 處以終極處置警告！使用 alert 阻斷使用者操作
                    alert("⚠️ 偵測到切換視窗/逃避作弊！\n\n處以終極懲罰：更換全新超級地獄難度題目，且鬧鈴音量直接拉滿至 100%！");

                    // 重新寫入新生成的超長地獄題目
                    document.getElementById('questionText').innerText = data.question;

                    // 清空原本的輸入欄
                    clearInput();

                    // 後端計時已被回溯 20 秒，前端音量直接拉滿
                    if (gainNode && audioCtx) {
                        gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);
                    }

                    // 同步最新的 UI (100% 音量，Level 4 紅色極速閃爍)
                    updatePenaltyUI(data.elapsed_seconds, 100, 4);

                    // 確保仍處於全螢幕與鎖定狀態
                    enterFullscreen();
                    document.querySelector('.container').classList.add('locked-mode');
                }
            } catch (e) {
                console.error("回報作弊懲罰請求失敗:", e);
            } finally {
                // 延遲重設焦點監聽，防止彈跳視窗引發循環觸發
                setTimeout(() => {
                    if (document.getElementById('audioModal').classList.contains('hidden') &&
                        !document.querySelector('.bell-icon').innerText.includes("☀️")) {
                        isChallengeActive = true;
                    }
                }, 1000);
            }
        }

        // 呼叫後端 API 啟動計時
        async function startAlarmTimer() {
            try {
                await fetch('https://mathwake-backend.zeabur.app/api/alarms/start', { method: 'POST' });
            } catch (e) {
                console.error("初始化後端計時器失敗:", e);
            }
        }

        // 利用 Web Audio API 建立純前端電子鬧鈴音效 (無須任何 mp3 檔案)
        function initAlarmSound() {
            try {
                window.AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();

                // 建立 GainNode 用於調控音量
                gainNode = audioCtx.createGain();
                // 初始音量設定為 20% (與後端初始懲罰對齊)
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.connect(audioCtx.destination);

                // 定時產生嗶嗶蜂鳴聲
                alarmIntervalId = setInterval(() => {
                    playBeep(880, 0.15); // 產生高頻 A5 聲
                    setTimeout(() => playBeep(880, 0.15), 200);
                }, 1000);
            } catch (e) {
                console.error("無法初始化 Web Audio API: ", e);
            }
        }

        // 產生單次嗶嗶聲
        function playBeep(frequency, duration) {
            if (!audioCtx || audioCtx.state === 'suspended' || !gainNode) return;

            const osc = audioCtx.createOscillator();

            osc.type = "sine"; // 正弦波
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

            // 連接至 gainNode 控制音量，再由 gainNode 連接 destination
            osc.connect(gainNode);

            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // 停止鬧鈴聲與定時器
        function stopAlarmSound() {
            if (alarmIntervalId) {
                clearInterval(alarmIntervalId);
                alarmIntervalId = null;
            }
            if (penaltyIntervalId) {
                clearInterval(penaltyIntervalId);
                penaltyIntervalId = null;
            }
            if (audioCtx) {
                audioCtx.close();
                audioCtx = null;
                gainNode = null;
            }
        }

        // 載入題目
        async function loadQuestion() {
            try {
                const response = await fetch('https://mathwake-backend.zeabur.app/api/generate_question');
                const data = await response.json();
                if (data.success) {
                    document.getElementById('questionText').innerText = data.question;
                    clearInput();
                } else {
                    showToast("❌ 無法取得題目，請重試！", false);
                }
            } catch (error) {
                console.error("Error loading question:", error);
                showToast("❌ 網路連線異常，無法連線後端！", false);
            }
        }

        // 啟動定時輪詢懲罰 API (每 2 秒與後端同步一次，極速緊迫節奏)
        function startPenaltyPolling() {
            // 立即執行一次同步
            syncPenalty();

            // 每 2 秒同步一次
            penaltyIntervalId = setInterval(syncPenalty, 2000);
        }

        async function syncPenalty() {
            try {
                const response = await fetch('https://mathwake-backend.zeabur.app/api/alarms/check-penalty');
                const data = await response.json();

                if (data.success && gainNode && audioCtx) {
                    const volRatio = data.volume_percentage / 100;

                    // 使用 linearRampToValueAtTime 讓音量在 0.8 秒內平滑漸變，與 2 秒輪詢極速響應
                    gainNode.gain.linearRampToValueAtTime(volRatio, audioCtx.currentTime + 0.8);

                    // 動態更新前端 UI
                    updatePenaltyUI(data.elapsed_seconds, data.volume_percentage, data.penalty_level);
                }
            } catch (e) {
                console.error("同步音量懲罰狀態失敗:", e);
            }
        }

        // 更新懲罰 UI 狀態
        function updatePenaltyUI(elapsed, volPercent, level) {
            // 1. 更新副標題呈現當前流逝秒數與音量
            const subtitle = document.getElementById('statusSubtitle');
            if (subtitle) {
                subtitle.innerHTML = `已響鈴 <span style="color:var(--danger-color); font-weight:800;">${elapsed}</span> 秒 | 當前音量：<span style="color:var(--danger-color); font-weight:800;">${volPercent}%</span>`;
            }

            // 2. 隨著音量比例上升，同步加快紅色呼吸燈的閃爍頻率
            const overlay = document.querySelector('.alarm-pulse-overlay');
            if (overlay) {
                // level 越低閃爍越慢（如 3 秒），level 最高 (4) 時閃爍頻率高達 0.6 秒
                const speed = Math.max(0.5, 3.0 - level * 0.6);
                overlay.style.animationDuration = `${speed}s`;

                // 增強紅暈的視覺衝擊
                if (level > 0) {
                    overlay.style.boxShadow = `inset 0 0 ${40 + level * 20}px rgba(239, 68, 68, ${0.1 + level * 0.08})`;
                }
            }
        }

        // 鍵盤輸入邏輯
        function updateDisplay() {
            const display = document.getElementById('inputDisplay');
            if (currentInput === "") {
                display.innerHTML = "";
                display.classList.remove('active-border');
            } else {
                display.innerHTML = currentInput + '<span class="cursor"></span>';
                display.classList.add('active-border');
            }
        }

        function appendNumber(num) {
            // 限制輸入位數不超過 6 位
            if (currentInput.length >= 6) return;
            currentInput += num.toString();
            updateDisplay();
            playKeyTapTone(440, 0.05); // 按鍵音
        }

        function clearInput() {
            currentInput = "";
            updateDisplay();
            playKeyTapTone(330, 0.05);
        }

        function backspaceInput() {
            if (currentInput.length > 0) {
                currentInput = currentInput.slice(0, -1);
                updateDisplay();
                playKeyTapTone(350, 0.05);
            }
        }

        // 輕微按鍵音效回饋
        function playKeyTapTone(freq, dur) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const tapGain = audioCtx.createGain();
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                tapGain.gain.setValueAtTime(0.015, audioCtx.currentTime);
                osc.connect(tapGain);
                tapGain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + dur);
            } catch (e) {
                console.error("Play tap tone failed:", e);
            }
        }

        // 送出答案驗證
        async function submitAnswer() {
            if (currentInput === "") {
                showToast("⚠️ 請先輸入答案！", false);
                return;
            }

            const solverCard = document.getElementById('solverCard');
            const formulaBox = document.getElementById('formulaBox');

            try {
                const response = await fetch('https://mathwake-backend.zeabur.app/api/verify_answer', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        answer: parseInt(currentInput, 10)
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // 答對處理
                    isChallengeActive = false; // F-03: 關閉焦點偵測，避免退出全螢幕觸發作弊
                    stopAlarmSound();
                    showToast("🎉 " + data.message, true);

                    // 解題成功視覺回饋
                    document.getElementById('statusSubtitle').innerText = "起床成功！祝您有美好的一天！";
                    document.getElementById('questionText').style.color = "var(--success-color)";
                    document.getElementById('inputDisplay').style.borderColor = "var(--success-color)";
                    document.getElementById('inputDisplay').style.color = "var(--success-color)";
                    document.querySelector('.bell-icon').style.animation = "none";
                    document.querySelector('.bell-icon').innerText = "☀️";

                    // F-03: 解除全螢幕並還原遮罩
                    exitFullscreen();
                    document.querySelector('.container').classList.remove('locked-mode');

                    // 移除紅色呼吸燈效果
                    const overlay = document.querySelector('.alarm-pulse-overlay');
                    if (overlay) {
                        overlay.style.animation = "none";
                        overlay.style.boxShadow = "none";
                    }

                    // 禁用按鍵
                    const keys = document.querySelectorAll('.key');
                    keys.forEach(k => k.style.pointerEvents = 'none');
                } else {
                    // 答錯處理：左右劇烈搖晃
                    formulaBox.classList.add('shake');
                    showToast("❌ " + data.message, false);

                    // 答錯音效
                    playBeep(220, 0.3); // 低音沉悶聲

                    // 清空輸入
                    clearInput();

                    // 動畫結束後移除 shake class 以利下次重複觸發
                    setTimeout(() => {
                        formulaBox.classList.remove('shake');
                    }, 500);
                }
            } catch (error) {
                console.error("Error submitting answer:", error);
                showToast("❌ 驗證失敗，請檢查網路連線", false);
            }
        }

        // 提示訊息 (Toast)
        function showToast(message, isSuccess) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            const toastIcon = document.getElementById('toast-icon');

            toastText.innerText = message;
            if (isSuccess) {
                toast.classList.add('success');
                toastIcon.innerText = "✓";
            } else {
                toast.classList.remove('success');
                toastIcon.innerText = "⚠️";
            }

            toast.classList.add('show');

            // 3秒後隱藏
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 支援實體鍵盤輸入
        document.addEventListener('keydown', (event) => {
            // 如果已解鎖進入關卡
            if (document.getElementById('audioModal').classList.contains('hidden')) {
                if (event.key >= '0' && event.key <= '9') {
                    appendNumber(parseInt(event.key));
                } else if (event.key === 'Backspace') {
                    backspaceInput();
                } else if (event.key === 'Escape' || event.key === 'c' || event.key === 'C') {
                    clearInput();
                } else if (event.key === 'Enter') {
                    submitAnswer();
                }
            }
        });
    </script>
</body>

</html>
